name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --python ${{ matrix.python-version }}

      - name: Ruff check
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy

      - name: Pytest
        run: uv run pytest --cov

      - name: Golden harness (per pipeline artifact)
        run: |
          set -e
          shopt -s nullglob
          for artifact in pipelines/*/*/; do
            echo "naru test ${artifact}"
            uv run python -m naru test "${artifact%/}"
          done

      - name: Lint (per pipeline and Mapping Artifact)
        run: |
          set -e
          shopt -s nullglob
          for artifact in pipelines/*/*/ examples/*/; do
            echo "naru lint ${artifact}"
            uv run python -m naru lint "${artifact%/}"
          done

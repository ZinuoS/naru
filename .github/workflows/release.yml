name: Release

# Triggered by pushing a tag matching v* (e.g. v0.1.0rc1, v0.1.0). A tag
# whose name contains "rc" (a release candidate) publishes to TestPyPI
# only; anything else -- a real release tag -- publishes to PyPI. Both
# publish steps use PyPI Trusted Publishing (OIDC): no API token is
# stored in this repo. See the Trusted Publisher setup instructions
# handed to the maintainer alongside this workflow -- a Trusted
# Publisher has to exist on each index, for this exact repo and
# workflow filename, before the corresponding publish job can succeed.

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy

      - name: Pytest
        run: uv run pytest --cov

      - name: Golden harness + lint (per pipeline and Mapping Artifact)
        run: |
          set -e
          shopt -s nullglob
          for artifact in pipelines/*/*/; do
            uv run python -m naru test "${artifact%/}"
          done
          for artifact in pipelines/*/*/ examples/*/; do
            uv run python -m naru lint "${artifact%/}"
          done

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build sdist and wheel
        run: uv build

      - name: Verify tag matches package version
        run: |
          set -e
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version="$(uv run python -c 'from importlib.metadata import version; print(version("naru"))')"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $pkg_version" >&2
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    needs: build
    if: contains(github.ref_name, 'rc')
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    needs: build
    if: "!contains(github.ref_name, 'rc')"
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

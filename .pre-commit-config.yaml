repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.2.0
    hooks:
      - id: mypy
        additional_dependencies: [pydantic>=2, pytest, "typer==0.26.8"]
        # transform.py files run inside naru.artifact's exec() sandbox
        # (docs/adr/0003-transform-loading.md): `ops` is a namespace
        # global injected at run time, not a real import mypy can see.
        exclude: ^pipelines/.*/transform\.py$
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
